name: ClusterFuzzLite

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  pr-fuzzing:
    if: ${{ hashFiles('fuzzing/Dockerfile') != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2

      - name: Run ClusterFuzzLite
        uses: google/clusterfuzzlite/actions/code-change@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  no-fuzz-targets:
    if: ${{ hashFiles('fuzzing/Dockerfile') == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip without fuzz targets
        run: echo "No fuzzing/Dockerfile found yet; add fuzz targets to enable ClusterFuzzLite scanning."
